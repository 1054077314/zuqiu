<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>教练信息</title>
    <link rel="stylesheet" href="../../layui/css/layui.css">
    <style>
        :root {
            --ink: #1a2e4c;
            --muted: #5e7189;
            --p: #0ea5e9;
            --p-soft: #38bdf8;
            --border: rgba(24, 86, 171, .08);
            --shadow: 0 8px 32px rgba(14,165,233,.15);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background:
                #f3f6fb;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            color: var(--ink);
        }
        .page-shell { width: 1200px; max-width: calc(100% - 24px); margin: 0 auto; padding: 22px 0 34px; }
        .subnav, .page-banner, .toolbar, .list-shell { background: #fff; border: 1px solid var(--border); border-radius: 20px; box-shadow: var(--shadow); }
        .subnav { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 16px 20px; margin-bottom: 18px; }
        .subnav-brand { font-size: 16px; font-weight: 700; color: var(--ink); }
        .subnav-links { display: flex; flex-wrap: wrap; gap: 10px; }
        .subnav-links a { display: inline-flex; align-items: center; justify-content: center; height: 40px; padding: 0 16px; border-radius: 999px; text-decoration: none; color: #24539a; background: rgba(29,103,193,.08); transition: all .2s ease; }
        .subnav-links a:hover { transform: translateY(-2px); background: rgba(29,103,193,.12); }
        .page-banner { overflow: hidden; position: relative; padding: 32px 34px; color: #fff; background: linear-gradient(135deg, rgba(8,36,77,.98), rgba(20,72,138,.95) 48%, rgba(42,123,214,.88)); }
        .page-banner:before, .page-banner:after { content: ''; position: absolute; border-radius: 50%; background: rgba(255,255,255,.08); }
        .page-banner:before { width: 240px; height: 240px; top: -110px; right: -40px; }
        .page-banner:after { width: 150px; height: 150px; left: -30px; bottom: -60px; }
        .page-banner > * { position: relative; z-index: 1; }
        .page-tag { display: inline-flex; align-items: center; padding: 8px 14px; border-radius: 999px; background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.16); font-size: 12px; }
        .page-banner h1 { margin: 16px 0 10px; font-size: 38px; }
        .page-banner p { margin: 0; max-width: 760px; color: rgba(255,255,255,.88); font-size: 15px; line-height: 1.9; }
        .toolbar, .list-shell { margin-top: 20px; }
        .toolbar { padding: 20px 22px; }
        .toolbar-form { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
        .toolbar-form .layui-input { width: 280px; height: 48px; border-radius: 16px; border: 1px solid #bdd0ea; background: rgba(244,248,255,.86); padding: 0 16px; }
        .toolbar-btn { height: 46px; padding: 0 18px; border: 0; border-radius: 14px; color: #fff; background: var(--p-soft); cursor: pointer; }
        .list-shell { padding: 24px; }
        .section-head { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 18px; }
        .section-head h2 { margin: 0; font-size: 28px; color: var(--ink); }
        .section-head span { color: var(--muted); font-size: 14px; }
        .card-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 20px; }
        .person-card { overflow: hidden; border-radius: 24px; background: linear-gradient(135deg, rgba(242,247,255,.95), rgba(255,255,255,.98)); border: 1px solid var(--border); box-shadow: 0 12px 28px rgba(32,85,161,.08); transition: all .22s ease; }
        .person-card:hover { transform: translateY(-4px); box-shadow: 0 18px 38px rgba(32,85,161,.14); }
        .person-cover { width: 100%; height: 260px; object-fit: cover; display: block; }
        .person-body { padding: 18px; }
        .person-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
        .person-name { margin: 0; font-size: 22px; color: var(--ink); }
        .role-chip { padding: 7px 12px; border-radius: 999px; background: rgba(220,233,249,.82); color: #547091; font-size: 13px; }
        .person-meta { color: var(--muted); line-height: 1.9; font-size: 14px; }
        .pager { margin-top: 24px; text-align: center; }
        .empty-box { padding: 44px 0; color: #8b9bb2; text-align: center; }
        @media (max-width: 1000px) { .card-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
        @media (max-width: 720px) { .card-grid { grid-template-columns: 1fr; } .toolbar-form .layui-input { width: 100%; } }
    </style>
</head>
<body>
<div id="app">
    <div class="page-shell">
        <div class="subnav">
            <div class="subnav-brand">足球俱乐部管理系统</div>
            <div class="subnav-links">
                <a href="../../index.html">首页</a>
                <a href="../gonggao/list.html">公告信息</a>
                <a href="../saishi/list.html">赛事信息</a>
                <a href="../jiaolian/list.html">教练信息</a>
                <a href="../login/login.html">个人中心</a>
            </div>
        </div>
        
        <div class="toolbar">
            <div class="toolbar-form">
                <input type="text" v-model="searchForm.jiaolianName" class="layui-input" placeholder="请输入教练姓名">
                <button type="button" class="toolbar-btn" @click="search">搜索教练</button>
            </div>
        </div>
        <div class="list-shell">
            <div class="section-head"><h2>教练列表</h2><span>共 {{ total }} 位教练</span></div>
            <div class="card-grid" v-if="dataList.length">
                <div class="person-card" v-for="(item,index) in dataList" :key="index">
                    <img class="person-cover" :src="img(item.img)" alt="教练图片">
                    <div class="person-body">
                        <div class="person-head">
                            <h3 class="person-name">{{ item.jiaolianName }}</h3>
                            <span class="role-chip">{{ item.sexValue || '未设置性别' }}</span>
                        </div>
                        <div class="person-meta">账号：{{ item.username || '暂无' }}</div>
                        <div class="person-meta">教练编号：{{ item.jiaolianUuidNumber || '暂无' }}</div>
                        <div class="person-meta">手机号：{{ item.jiaolianPhone || '暂无' }}</div>
                        <div class="person-meta">邮箱：{{ item.jiaolianEmail || '暂无' }}</div>
                    </div>
                </div>
            </div>
            <div class="empty-box" v-else>暂无教练数据</div>
            <div class="pager" id="pager"></div>
        </div>
    </div>
</div>
<script src="../../layui/layui.js"></script>
<script src="../../js/vue.js"></script>
<script src="../../xznstatic/js/element.min.js"></script>
<link rel="stylesheet" href="../../xznstatic/css/element.min.css">
<script src="../../js/config.js"></script>
<script src="../../modules/config.js"></script>
<script src="../../js/utils.js"></script>
<script>
var http = layui.http || { baseurl: (typeof resolveProjectBase === 'function' ? resolveProjectBase() : (window.location.protocol + '//' + window.location.host + '/')) };
var vue = new Vue({ el: '#app', data: { baseUrl: http.baseurl, dataList: [], total: 0, searchForm: { page: 1, limit: 9, sort: 'id', order: 'desc', jiaolianName: '' } }, methods: { img: function(path) { if (!path) return ''; if (path.indexOf('http') === 0) return path; return this.baseUrl.replace(/\/$/, '') + '/upload/' + path.replace(/^.*upload\//, ''); },  search: function() { this.searchForm.page = 1; this.fetchList(); }, fetchList: function() {} } });
layui.use(['http', 'laypage'], function() {
    var http = layui.http;
    var laypage = layui.laypage;
    vue.baseUrl = http.baseurl;
    localStorage.setItem('goUtl', './pages/jiaolian/list.html');
    vue.fetchList = function() {
        http.request('jiaolian/page', 'get', vue.searchForm, function(res) {
            var data = res.data || {};
            vue.dataList = data.list || [];
            vue.total = data.total || 0;
            laypage.render({ elem: 'pager', count: vue.total, limit: vue.searchForm.limit, curr: vue.searchForm.page, groups: 3, layout: ['prev', 'page', 'next'], jump: function(obj, first) { if (!first) { vue.searchForm.page = obj.curr; vue.fetchList(); } } });
        });
    };
    vue.fetchList();
});
</script>
</body>
</html>
