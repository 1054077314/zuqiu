<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>赛事详情</title>
    <link rel="stylesheet" href="../../layui/css/layui.css">
    <style>
        :root { --p:#1f4f95; --p-soft:#3b82f6; --p-light:#eaf2ff; --ink:#1a2e4c; --muted:#5e7189; --border:rgba(40,70,120,.08); --shadow:0 8px 32px rgba(25,60,120,.07); }
        * { box-sizing:border-box; }
        body { margin:0; background: #f3f6fb; font-family:'Microsoft YaHei','PingFang SC',sans-serif; color:var(--ink); }
        .page-shell { width:1380px; max-width:calc(100% - 24px); margin:0 auto; padding:12px 0 28px; }
        .topbar,.detail-shell,.content-card,.info-card { background:#fff; border:1px solid var(--border); border-radius:20px; box-shadow:var(--shadow); }
        .topbar { display:flex; align-items:center; justify-content:space-between; gap:16px; padding:18px 24px; margin-bottom:18px; }
        .topbar-title { font-size:18px; font-weight:700; color:var(--ink); }
        .topbar-links { display:flex; flex-wrap:wrap; gap:10px; }
        .topbar-links a { display:inline-flex; align-items:center; justify-content:center; height:44px; padding:0 18px; border-radius:999px; text-decoration:none; color:#24539a; background:rgba(29,103,193,.08); transition:all .2s ease; }
        .topbar-links a:hover,.back-btn:hover,.list-btn:hover { transform:translateY(-2px); }
        .detail-shell { overflow:hidden; }
        .hero { padding:42px; color:#fff; background:linear-gradient(125deg, rgba(8,36,77,.98) 0%, rgba(20,72,138,.95) 46%, rgba(42,123,214,.9) 100%); position:relative; overflow:hidden; }
        .hero:before,.hero:after { content:''; position:absolute; border-radius:50%; background:rgba(255,255,255,.08); }
        .hero:before { width:260px; height:260px; top:-110px; right:-40px; }
        .hero:after { width:180px; height:180px; left:-30px; bottom:-70px; }
        .hero > * { position:relative; z-index:1; }
        .hero-label { display:inline-flex; align-items:center; padding:8px 14px; border-radius:999px; background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.16); font-size:12px; margin-bottom:14px; }
        .hero h1 { margin:0 0 14px; font-size:48px; line-height:1.2; }
        .hero-meta { display:flex; flex-wrap:wrap; gap:10px; }
        .hero-chip { padding:8px 14px; border-radius:999px; background:rgba(255,255,255,.14); font-size:13px; color:rgba(255,255,255,.88); }
        .detail-body { padding:30px; }
        .media-grid { display:grid; grid-template-columns:minmax(0, 1.12fr) minmax(340px, .88fr); gap:24px; }
        .cover,.video-box video { width:100%; min-height:320px; max-height:560px; object-fit:cover; border-radius:24px; display:block; background:linear-gradient(135deg, #d9ebff, #b8d8ff); }
        .video-box video { background:#000; object-fit:contain; }
        .info-grid { display:grid; grid-template-columns:repeat(3, minmax(0, 1fr)); gap:18px; margin-top:24px; }
        .info-card { padding:22px; }
        .info-card .label { color:var(--muted); font-size:13px; margin-bottom:8px; }
        .info-card .value { color:var(--ink); font-size:18px; line-height:1.7; word-break:break-word; }
        .content-card { margin-top:24px; padding:28px; }
        .content-head { display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:18px; }
        .content-head h3 { margin:0; font-size:28px; color:var(--ink); }
        .content-head span { font-size:15px; color:var(--muted); }
        .content { color:#48627f; line-height:1.95; font-size:16px; }
        .action-row { margin-top:26px; display:flex; justify-content:flex-end; gap:12px; flex-wrap:wrap; }
        .back-btn,.list-btn { height:46px; padding:0 22px; border:0; border-radius:14px; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; justify-content:center; transition:all .2s ease; }
        .back-btn { color:#fff; background:var(--p-soft); }
        .list-btn { color:#24539a; background:rgba(29,103,193,.08); }
        @media (max-width:960px) { .media-grid,.info-grid { grid-template-columns:1fr; } }
    </style>
</head>
<body>
<div id="app">
    <div class="page-shell">
        <div class="topbar">
            <div class="topbar-title">赛事详情</div>
            <div class="topbar-links">
                <a href="../../index.html">首页</a>
                <a href="./list.html">赛事列表</a>
            </div>
        </div>
        <div class="detail-shell">
            <div class="hero">
                <div class="hero-label">赛事详情页</div>
                <h1>{{ detail.saishiName || '赛事详情' }}</h1>
                <div class="hero-meta">
                    <span class="hero-chip">赛事地点：{{ detail.saishiAddress || '待定' }}</span>
                    <span class="hero-chip">赛事类型：{{ detail.saishiValue || '未分类' }}</span>
                </div>
            </div>
            <div class="detail-body">
                <div class="media-grid">
                    <img class="cover" :src="coverImage" alt="赛事图片">
                </div>
                <div class="info-grid">
                    <div class="info-card"><div class="label">赛事名称</div><div class="value">{{ detail.saishiName || '暂无' }}</div></div>
                    <div class="info-card"><div class="label">录入时间</div><div class="value">{{ detail.insertTime || '暂无' }}</div></div>
                    <div class="info-card"><div class="label">赛事类型</div><div class="value">{{ detail.saishiValue || '未分类' }}</div></div>
                </div>
                <div class="content-card">
                    <div class="content-head">
                        <h3>赛事介绍</h3>
                        <span>查看赛事说明、安排信息和补充内容</span>
                    </div>
                    <div class="content" v-html="renderContent(detail.saishiContent)"></div>
                </div>
                <div class="action-row">
                    <a class="list-btn" href="./list.html">查看赛事列表</a>
                    <button type="button" class="back-btn" onclick="history.back()">返回上一页</button>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="../../layui/layui.js"></script>
<script src="../../js/vue.js"></script>
<script src="../../xznstatic/js/element.min.js"></script>
<link rel="stylesheet" href="../../xznstatic/css/element.min.css">
<script src="../../js/config.js"></script>
<script src="../../modules/config.js"></script>
<script>
var vue = new Vue({ el:'#app', data:{ baseUrl:'', detail:{} }, computed:{ coverImage:function(){ if (this.detail.saishiPhoto) { return this.baseUrl + this.detail.saishiPhoto.split(',')[0]; } return '../../img/front-img-bg.jpg'; } }, methods:{ renderContent:function(content){ if (!content) { return '暂无内容'; } return content.replace(/src="upload\//g, 'src="' + this.baseUrl + 'upload/').replace(/<img/g, '<img style="max-width:100%;height:auto;border-radius:16px;display:block;margin:18px auto;"'); } } });
layui.use(['http'], function() {
    var http = layui.http;
    var id = http.getParam('id');
    vue.baseUrl = http.baseurl;
    http.request('saishi/info/' + id, 'get', {}, function(res) { vue.detail = res.data || {}; });
});
</script>
</body>
</html>
