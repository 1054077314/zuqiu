<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>赛事信息</title>
    <link rel="stylesheet" href="../../layui/css/layui.css">
    <style>
        :root { --ink:#1a2e4c; --muted:#5e7189; --p:#0ea5e9; --p-soft:#38bdf8; --p-light:#f0f9ff; --border:rgba(14,165,233,.10); --shadow:0 8px 32px rgba(14,165,233,.15); --shadow-sm:0 4px 16px rgba(14,165,233,.12); --radius:20px; --radius-sm:14px; --pill:999px; }
        * { box-sizing:border-box; }
        body { margin:0; background:#f3f6fb; font-family:'Microsoft YaHei','PingFang SC',sans-serif; color:var(--ink); }
        .page-shell { width:1380px; max-width:calc(100% - 24px); margin:0 auto; padding:12px 0 28px; }
        .subnav,.page-banner,.toolbar,.list-shell { background:#fff; border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); }
        .subnav { display:flex; align-items:center; justify-content:space-between; gap:16px; padding:18px 24px; margin-bottom:18px; }
        .subnav-brand { font-size:18px; font-weight:700; color:var(--ink); }
        .subnav-links { display:flex; flex-wrap:wrap; gap:10px; }
        .subnav-links a { display:inline-flex; align-items:center; justify-content:center; height:40px; padding:0 18px; border-radius:var(--pill); text-decoration:none; color:var(--muted); font-size:14px; font-weight:500; transition:all .2s ease; }
        .subnav-links a:hover { color:#fff; background:var(--p); box-shadow:0 6px 18px rgba(14,165,233,.28); }
        .page-banner { overflow:hidden; position:relative; padding:36px 40px; color:#fff; background:linear-gradient(135deg, #075985, #0c7fbb 45%, #0ea5e9); }
        .page-banner::before,.page-banner::after { content:''; position:absolute; border-radius:50%; pointer-events:none; }
        .page-banner::before { width:260px; height:260px; top:-110px; right:-40px; background:radial-gradient(circle, rgba(14,165,233,.15), transparent 70%); }
        .page-banner::after { width:180px; height:180px; left:-40px; bottom:-70px; background:radial-gradient(circle, rgba(14,165,233,.1), transparent 70%); }
        .page-banner > * { position:relative; z-index:1; }
        .page-tag { display:inline-flex; align-items:center; padding:6px 14px; border-radius:var(--pill); background:rgba(14,165,233,.2); border:1px solid rgba(14,165,233,.25); font-size:12px; font-weight:500; }
        .page-banner h1 { margin:18px 0 12px; font-size:48px; }
        .page-banner p { margin:0; max-width:880px; color:rgba(255,255,255,.88); font-size:17px; line-height:1.9; }
        .toolbar,.list-shell { margin-top:20px; }
        .toolbar { padding:24px 24px; }
        .toolbar-top { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
        .type-chip { display:inline-flex; align-items:center; justify-content:center; min-height:40px; padding:0 16px; border-radius:var(--pill); border:1px solid var(--border); background:var(--p-light); color:var(--muted); font-size:13px; cursor:pointer; transition:all .2s ease; }
        .type-chip.active,.type-chip:hover { color:#fff; border-color:transparent; background:var(--p-soft); box-shadow:0 6px 18px rgba(14,165,233,.2); }
        .toolbar-form { display:flex; flex-wrap:wrap; gap:12px; align-items:center; }
        .toolbar-form .layui-input { width:320px; height:48px; border-radius:var(--radius-sm); border:1px solid #bdd0ea; background:#f8faff; padding:0 16px; font-size:14px; }
        .toolbar-btn { height:48px; padding:0 22px; border:0; border-radius:14px; color:#fff; background:var(--p-soft); cursor:pointer; }
        .list-shell { padding:28px; }
        .section-head { display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:18px; }
        .section-head h2 { margin:0; font-size:22px; font-weight:700; }
        .section-head span { color:var(--muted); font-size:14px; }
        .match-grid { display:grid; grid-template-columns:repeat(3, minmax(0, 1fr)); gap:24px; }
        .match-card { overflow:hidden; border-radius:26px; background:linear-gradient(135deg, rgba(242,247,255,.95), rgba(255,255,255,.98)); border:1px solid var(--border); cursor:pointer; transition:all .22s ease; }
        .match-card:hover { transform:translateY(-4px); box-shadow:0 18px 36px rgba(32,85,161,.14); }
        .match-cover { width:100%; height:260px; object-fit:cover; display:block; }
        .match-body { padding:22px; }
        .match-head { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:10px; }
        .match-title { margin:0; font-size:23px; color:var(--ink); }
        .type-badge { flex-shrink:0; padding:7px 12px; border-radius:999px; background:rgba(220,233,249,.82); color:#547091; font-size:13px; }
        .match-meta { color:var(--muted); line-height:1.9; font-size:15px; }
        .pager { margin-top:24px; text-align:center; }
        .empty-box { padding:36px 0; color:#98a8be; text-align:center; font-size:14px; }
        @media (max-width:1000px) { .match-grid { grid-template-columns:repeat(2, minmax(0, 1fr)); } }
        @media (max-width:720px) { .match-grid { grid-template-columns:1fr; } .toolbar-form .layui-input { width:100%; } }
    </style>
</head>
<body>
<div id="app">
    <div class="page-shell">
        <div class="subnav">
            <div class="subnav-brand">足球俱乐部管理系统</div>
            <div class="subnav-links">
                <a href="../../index.html">首页</a>
                <a href="../gonggao/list.html">公告信息</a>
                <a href="../saishi/list.html">赛事信息</a>
                <a href="../jiaolian/list.html">教练信息</a>
                <a href="../login/login.html">个人中心</a>
            </div>
        </div>
       
        <div class="toolbar">
            <div class="toolbar-top">
                <div class="type-chip" :class="{active: !searchForm.saishiTypes}" @click="setType('')">全部类型</div>
                <div class="type-chip" v-for="(item,index) in saishiTypesList" :key="index" :class="{active: String(searchForm.saishiTypes) === String(item.codeIndex)}" @click="setType(item.codeIndex)">{{ item.indexName }}</div>
            </div>
            <div class="toolbar-form">
                <input type="text" v-model="searchForm.saishiName" class="layui-input" placeholder="请输入赛事名称">
                <button type="button" class="toolbar-btn" @click="search">搜索赛事</button>
            </div>
        </div>
        <div class="list-shell">
            <div class="section-head"><h2>赛事列表</h2><span>共 {{ total }} 条赛事</span></div>
            <div class="match-grid" v-if="dataList.length">
                <div class="match-card" v-for="(item,index) in dataList" :key="index" @click="jump('../saishi/detail.html?id=' + item.id)">
                    <img class="match-cover" :src="img(item.img)" alt="赛事图片">
                    <div class="match-body">
                        <div class="match-head">
                            <h3 class="match-title">{{ item.saishiName }}</h3>
                            <span class="type-badge">{{ item.saishiValue || '未分类' }}</span>
                        </div>
                        <div class="match-meta">赛事地点：{{ item.saishiAddress || '待定' }}</div>
                        <div class="match-meta">录入时间：{{ item.insertTime || '暂无时间' }}</div>
                    </div>
                </div>
            </div>
            <div class="empty-box" v-else>暂无赛事数据</div>
            <div class="pager" id="pager"></div>
        </div>
    </div>
</div>
<script src="../../layui/layui.js"></script>
<script src="../../js/vue.js"></script>
<script src="../../xznstatic/js/element.min.js"></script>
<link rel="stylesheet" href="../../xznstatic/css/element.min.css">
<script src="../../js/config.js"></script>
<script src="../../modules/config.js"></script>
<script src="../../js/utils.js"></script>
<script>
var runtimeBaseUrl = (typeof resolveProjectBase === 'function') ? resolveProjectBase() : (window.location.protocol + '//' + window.location.host);
var http = layui.http || { baseurl: (typeof resolveProjectBase === 'function' ? resolveProjectBase() : (window.location.protocol + '//' + window.location.host + '/')) };
var vue = new Vue({ el:'#app', data:{ baseUrl: http.baseurl, saishiTypesList:[], dataList:[], total:0, searchForm:{ page:1, limit:9, sort:'id', order:'desc', saishiDeleteStart:1, saishiDeleteEnd:1, saishiName:'', saishiTypes:'' } }, methods: { img: function(path) { if (!path) return ''; if (path.indexOf('http') === 0) return path; return this.baseUrl.replace(/\/$/, '') + '/upload/' + path.replace(/^.*upload\//, ''); },  jump:function(url){ jump(url); }, safeImage:function(url){ if (typeof resolveImage === 'function') { return img(item.img); } if (!url) { return ''; } url = String(url).trim(); if (/^(https?:|data:|blob:)/i.test(url)) { return url; } if (url.indexOf('//') === 0) { return (window.location.protocol || 'http:') + url; } var base = String(this.baseUrl || runtimeBaseUrl || '').replace(/\/+$/, ''); return base + '/' + url.replace(/^\.?\//, ''); }, setType:function(type){ this.searchForm.saishiTypes = type; this.searchForm.page = 1; this.fetchList(); }, search:function(){ this.searchForm.page = 1; this.fetchList(); }, fetchList:function(){} } });
layui.use(['http','laypage'], function() {
    var http = layui.http;
    var laypage = layui.laypage;
    vue.baseUrl = (http && http.baseurl) ? http.baseUrl: http.baseurl;
    localStorage.setItem('goUtl', './pages/saishi/list.html');
    http.request('dictionary/page', 'get', { page:1, limit:100, dicCode:'saishi_types' }, function(res) { vue.saishiTypesList = (res.data && res.data.list) || []; });
    vue.fetchList = function() {
        http.request('saishi/page', 'get', vue.searchForm, function(res) {
            var data = res.data || {};
            vue.dataList = data.list || [];
            vue.total = data.total || 0;
            laypage.render({ elem:'pager', count:vue.total, limit:vue.searchForm.limit, curr:vue.searchForm.page, groups:3, layout:['prev','page','next'], jump:function(obj, first){ if (!first) { vue.searchForm.page = obj.curr; vue.fetchList(); } } });
        });
    };
    vue.fetchList();
});
</script>
</body>
</html>
