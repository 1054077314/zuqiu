<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>用户信息</title>
    <link rel="stylesheet" href="../../layui/css/layui.css">
    <style>
        :root {
            --ink: #1a2e4c;
            --muted: #5e7189;
            --p: #0ea5e9;
            --p-soft: #38bdf8;
            --p-light: #f0f9ff;
            --border: rgba(14,165,233,.10);
            --shadow: 0 8px 32px rgba(14,165,233,.15);
            --shadow-sm: 0 4px 16px rgba(14,165,233,.12);
            --radius: 20px;
            --radius-sm: 14px;
            --pill: 999px;
        }
        * { box-sizing: border-box; }
        body { margin: 0; background: #f3f6fb; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; color: var(--ink); }
        .page-shell { width: 1200px; max-width: calc(100% - 24px); margin: 0 auto; padding: 22px 0 34px; }
        .subnav, .page-banner, .toolbar, .list-shell { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }
        .subnav { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 16px 20px; margin-bottom: 18px; }
        .subnav-brand { font-size: 16px; font-weight: 700; color: var(--ink); }
        .subnav-links { display: flex; flex-wrap: wrap; gap: 10px; }
        .subnav-links a { display: inline-flex; align-items: center; justify-content: center; height: 40px; padding: 0 16px; border-radius: var(--pill); text-decoration: none; color: var(--muted); font-size: 14px; font-weight: 500; transition: all .2s ease; }
        .subnav-links a:hover { color: #fff; background: var(--p); box-shadow: 0 6px 18px rgba(14,165,233,.28); }
        .page-banner { overflow: hidden; position: relative; padding: 32px 34px; color: #fff; background: linear-gradient(135deg, #075985, #0c7fbb 45%, #0ea5e9); }
        .page-banner::before, .page-banner::after { content: ''; position: absolute; border-radius: 50%; pointer-events: none; }
        .page-banner::before { width: 240px; height: 240px; top: -110px; right: -40px; background: radial-gradient(circle, rgba(14,165,233,.15), transparent 70%); }
        .page-banner::after { width: 150px; height: 150px; left: -30px; bottom: -60px; background: radial-gradient(circle, rgba(14,165,233,.1), transparent 70%); }
        .page-banner > * { position: relative; z-index: 1; }
        .page-tag { display: inline-flex; align-items: center; padding: 6px 14px; border-radius: var(--pill); background: rgba(14,165,233,.2); border: 1px solid rgba(14,165,233,.25); font-size: 12px; font-weight: 500; }
        .page-banner h1 { margin: 16px 0 10px; font-size: 38px; }
        .page-banner p { margin: 0; max-width: 760px; color: rgba(255,255,255,.88); font-size: 15px; line-height: 1.9; }
        .toolbar, .list-shell { margin-top: 20px; }
        .toolbar { padding: 20px 22px; }
        .toolbar-form { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; }
        .toolbar-form .layui-input { width: 260px; height: 48px; border-radius: var(--radius-sm); border: 1px solid #bdd0ea; background: #f8faff; padding: 0 16px; font-size: 14px; }
        .toolbar-btn { height: 48px; padding: 0 20px; border: 0; border-radius: var(--radius-sm); color: #fff; background: var(--p-soft); cursor: pointer; font-size: 14px; font-weight: 500; }
        .list-shell { padding: 24px; }
        .section-head { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 18px; }
        .section-head h2 { margin: 0; font-size: 22px; font-weight: 700; }
        .section-head span { color: var(--muted); font-size: 14px; }
        .card-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 20px; }
        .person-card { overflow: hidden; border-radius: var(--radius); background: #fff; border: 1px solid var(--border); box-shadow: var(--shadow-sm); transition: all .2s ease; }
        .person-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
        .person-cover { width: 100%; height: 260px; object-fit: cover; display: block; }
        .person-body { padding: 18px; }
        .person-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
        .person-name { margin: 0; font-size: 22px; color: var(--ink); }
        .role-chip { padding: 5px 12px; border-radius: var(--pill); background: var(--p-light); color: var(--p); font-size: 12px; font-weight: 600; }
        .person-meta { color: var(--muted); line-height: 1.9; font-size: 14px; }
        .pager { margin-top: 24px; text-align: center; }
        .empty-box { padding: 36px 0; color: #98a8be; text-align: center; font-size: 14px; }
        @media (max-width: 1000px) { .card-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
        @media (max-width: 720px) { .card-grid { grid-template-columns: 1fr; } .toolbar-form .layui-input { width: 100%; } }
    </style>
</head>
<body>
<div id="app">
    <div class="page-shell">
        <div class="subnav"><div class="subnav-brand">足球俱乐部管理系统</div><div class="subnav-links"><a href="../../index.html">首页</a><a href="../gonggao/list.html">公告信息</a><a href="../saishi/list.html">赛事信息</a><a href="../jiaolian/list.html">教练信息</a><a href="../login/login.html">个人中心</a></div></div>
        <div class="page-banner"><div class="page-tag">用户信息</div><h1>用户信息</h1><p>查看前台用户信息，支持按姓名搜索，便于前台快速浏览用户成员。</p></div>
        <div class="toolbar"><div class="toolbar-form"><input type="text" v-model="searchForm.yonghuName" class="layui-input" placeholder="请输入用户姓名"><button type="button" class="toolbar-btn" @click="search">搜索用户</button></div></div>
        <div class="list-shell">
            <div class="section-head"><h2>用户列表</h2><span>共 {{ total }} 位用户</span></div>
            <div class="card-grid" v-if="dataList.length"><div class="person-card" v-for="(item,index) in dataList" :key="index"><img class="person-cover" :src="img(item.img)" alt="用户图片"><div class="person-body"><div class="person-head"><h3 class="person-name">{{ item.yonghuName }}</h3><span class="role-chip">{{ item.sexValue || '未设置性别' }}</span></div><div class="person-meta">账号：{{ item.username || '暂无' }}</div><div class="person-meta">用户编号：{{ item.yonghuUuidNumber || '暂无' }}</div><div class="person-meta">手机号：{{ item.yonghuPhone || '暂无' }}</div><div class="person-meta">邮箱：{{ item.yonghuEmail || '暂无' }}</div></div></div></div>
            <div class="empty-box" v-else>暂无用户数据</div>
            <div class="pager" id="pager"></div>
        </div>
    </div>
</div>
<script src="../../layui/layui.js"></script>
<script src="../../js/vue.js"></script>
<script src="../../xznstatic/js/element.min.js"></script>
<link rel="stylesheet" href="../../xznstatic/css/element.min.css">
<script src="../../js/config.js"></script>
<script src="../../modules/config.js"></script>
<script src="../../js/utils.js"></script>
<script>
var http = layui.http || { baseurl: (typeof resolveProjectBase === 'function' ? resolveProjectBase() : (window.location.protocol + '//' + window.location.host + '/')) };
var vue = new Vue({ el: '#app', data: { baseUrl: http.baseurl, dataList: [], total: 0, searchForm: { page: 1, limit: 9, sort: 'id', order: 'desc', yonghuName: '' } }, methods: { img: function(path) { if (!path) return ''; if (path.indexOf('http') === 0) return path; return this.baseUrl.replace(/\/$/, '') + '/upload/' + path.replace(/^.*upload\//, ''); },  search: function() { this.searchForm.page = 1; this.fetchList(); }, fetchList: function() {} } });
layui.use(['http', 'laypage'], function() { var http = layui.http; var laypage = layui.laypage; vue.baseUrl = http.baseurl; localStorage.setItem('goUtl', './pages/yonghu/list.html'); vue.fetchList = function() { http.request('yonghu/page', 'get', vue.searchForm, function(res) { var data = res.data || {}; vue.dataList = data.list || []; vue.total = data.total || 0; laypage.render({ elem: 'pager', count: vue.total, limit: vue.searchForm.limit, curr: vue.searchForm.page, groups: 3, layout: ['prev', 'page', 'next'], jump: function(obj, first) { if (!first) { vue.searchForm.page = obj.curr; vue.fetchList(); } } }); }); }; vue.fetchList(); });
</script>
</body>
</html>
