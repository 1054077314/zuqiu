<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>用户新增入口</title>
    <link rel="stylesheet" href="../../layui/css/layui.css">
    <style>
        :root { --ink:#1a2e4c; --muted:#5e7189; --line:rgba(14,165,233,.10); --shadow:0 8px 32px rgba(14,165,233,.15); --p:#0ea5e9; --p-soft:#38bdf8; --p-light:#f0f9ff; }
        * { box-sizing:border-box; }
        body { margin:0; font-family:'Microsoft YaHei','PingFang SC',sans-serif; color:var(--ink); background:#f3f6fb; }
        .page-shell { width:1080px; max-width:calc(100% - 24px); margin:0 auto; padding:24px 0 36px; }
        .topbar,.hero,.content-card { background:#fff; border:1px solid var(--line); border-radius:20px; box-shadow:var(--shadow); }
        .topbar { padding:16px 20px; display:flex; align-items:center; justify-content:space-between; gap:16px; }
        .topbar strong { font-size:16px; }
        .topbar a { color:#2d6fc5; text-decoration:none; }
        .hero { margin-top:18px; padding:30px 32px; color:#fff; background:linear-gradient(125deg, rgba(8,36,77,.98) 0%, rgba(20,72,138,.95) 46%, rgba(42,123,214,.9) 100%); position:relative; overflow:hidden; }
        .hero:before,.hero:after { content:''; position:absolute; border-radius:50%; background:rgba(255,255,255,.08); }
        .hero:before { width:220px; height:220px; top:-90px; right:-40px; }
        .hero:after { width:140px; height:140px; left:-30px; bottom:-60px; }
        .hero > * { position:relative; z-index:1; }
        .hero-tag { display:inline-flex; align-items:center; padding:8px 14px; border-radius:999px; background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.16); font-size:12px; margin-bottom:14px; }
        .hero h1 { margin:0 0 12px; font-size:38px; line-height:1.2; }
        .hero p { margin:0; max-width:760px; line-height:1.9; color:rgba(236,244,255,.88); }
        .content-card { margin-top:20px; padding:26px; }
        .content-card h2 { margin:0 0 12px; font-size:28px; }
        .content-card p { margin:0; color:var(--muted); line-height:1.9; }
        .action-grid { margin-top:22px; display:grid; grid-template-columns:repeat(3, minmax(0,1fr)); gap:14px; }
        .action-btn { min-height:52px; border-radius:18px; text-decoration:none; display:inline-flex; align-items:center; justify-content:center; color:#fff; background:var(--p-soft); box-shadow:0 8px 20px rgba(14,165,233,.25); transition:.22s ease; padding:0 18px; }
        .action-btn:hover { transform:translateY(-2px); }
        @media (max-width:780px) { .action-grid { grid-template-columns:1fr; } }
    </style>
</head>
<body>
<div class="page-shell">
    <div class="topbar"><strong>足球俱乐部管理系统</strong><a href="../../index.html">返回首页</a></div>
    <div class="hero">
        <div class="hero-tag">功能入口说明</div>
        <h1>用户功能入口已调整</h1>
        <p>前台用户新增已经整合到注册与个人中心流程中，这个旧页面不再使用。</p>
    </div>
    <div class="content-card">
        <h2>可继续前往的页面</h2>
        <p>这个旧模板页已经不再作为正式业务入口保留。下面保留了当前系统可用的直接入口，避免打开旧页时看到乱码或失效表单。</p>
        <div class="action-grid">
                <a class="action-btn" href="./register.html?tablename=yonghu">前往用户注册</a>
                <a class="action-btn" href="./center.html">前往个人中心</a>
                <a class="action-btn" href="../../index.html">返回首页</a>
        </div>
    </div>
</div>
</body>
</html>
