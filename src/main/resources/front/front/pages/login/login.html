<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Ohana 俱乐部 | 梦幻冒险</title>
    <link rel="stylesheet" href="../../layui/css/layui.css">
    <style>
        :root {
            --sky-light: #e0f2fe;
            --stitch-blue: #0ea5e9;
            --deep-ocean: #075985;
            --leaf-green: #34d399; /* 翠绿色 */
            --glass: rgba(255, 255, 255, 0.8);
        }

        * { box-sizing: border-box; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--sky-light);
            overflow: hidden;
            position: relative;
        }

        /* --- 背景装饰：动态绿叶 --- */
        .leaf-container {
            position: absolute;
            z-index: 2;
            pointer-events: none;
        }
        .palm-leaf {
            font-size: 160px;
            color: var(--leaf-green); /* 应用绿色 */
            opacity: 0.3; /* 增加不透明度 */
            transform-origin: bottom center; /* 从底部开始摇摆 */
            animation: sway_slow 6s ease-in-out infinite alternate;
        }
        
        /* 不同的叶子有不同的动效速度和大小 */
        @keyframes sway_slow {
            0% { transform: rotate(-5deg) scale(1); }
            50% { transform: rotate(10deg) scale(1.02); }
            100% { transform: rotate(-3deg) scale(1); }
        }
        @keyframes sway_fast {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-15deg); }
            100% { transform: rotate(5deg); }
        }

        /* --- 动态多层波浪背景 (保持蓝调) --- */
        .ocean { 
            position: absolute; bottom: 0; left: 0; width: 100%; height: 25%;
            background: #bae6fd; z-index: 1;
        }
        .wave {
            position: absolute; bottom: 100%; width: 200%; height: 80px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%23bae6fd" d="M0,160L48,176C96,192,192,224,288,213.3C384,203,480,149,576,144C672,139,768,181,864,181.3C960,181,1056,139,1152,122.7C1248,107,1344,117,1392,122.7L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>');
            background-size: 50% 100%;
            animation: waveFlow 12s linear infinite;
        }
        .wave:nth-child(2) {
            opacity: 0.5; height: 100px; bottom: 90%;
            animation: waveFlow 8s linear infinite reverse;
        }
        @keyframes waveFlow { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* --- 3D 浮动卡片 (保持原本质感) --- */
        #app { position: relative; z-index: 10; width: 100%; max-width: 420px; padding: 20px; }
        
        .login-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 50px 40px 40px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 30px 60px rgba(14, 165, 233, 0.15);
            animation: cardFloat 6s ease-in-out infinite;
        }
        @keyframes cardFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* 史迪奇头像 */
        .stitch-avatar {
            width: 100px; height: 85px; background: var(--stitch-blue);
            margin: -95px auto 25px; border-radius: 45% 45% 50% 50%;
            position: relative; box-shadow: 0 15px 35px rgba(14, 165, 233, 0.4);
        }
        .stitch-avatar::before, .stitch-avatar::after {
            content: ""; position: absolute; top: 5px; width: 55px; height: 40px;
            background: var(--stitch-blue); border-radius: 50%; z-index: -1;
        }
        .stitch-avatar::before { left: -35px; transform: rotate(-35deg); border-left: 8px solid #0284c7; }
        .stitch-avatar::after { right: -35px; transform: rotate(35deg); border-right: 8px solid #0284c7; }
        .stitch-avatar .eyes {
            display: flex; justify-content: space-around; padding-top: 30px;
        }
        .stitch-avatar .eye { width: 22px; height: 28px; background: #1e293b; border-radius: 50%; }

        /* --- UI 元素 --- */
        .header h1 { 
            color: var(--deep-ocean); font-size: 28px; font-weight: 800; 
            letter-spacing: 1px; margin-bottom: 8px; 
        }
        .header p { color: #64748b; font-size: 14px; margin-bottom: 30px; }

        .role-selector {
            display: flex; background: rgba(0,0,0,0.04); padding: 5px;
            border-radius: 20px; margin-bottom: 25px;
        }
        .role-btn {
            flex: 1; padding: 12px; border-radius: 16px; cursor: pointer;
            font-size: 14px; font-weight: bold; color: #64748b;
        }
        .role-btn.active {
            background: #fff; color: var(--stitch-blue);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .layui-input {
            border-radius: 16px !important; border: 1.5px solid #e2e8f0 !important;
            height: 52px !important; background: rgba(255,255,255,0.6) !important;
            margin-bottom: 15px; padding-left: 20px !important;
        }
        .layui-input:focus {
            border-color: var(--stitch-blue) !important;
            background: #fff !important;
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1) !important;
        }

        .submit-btn {
            width: 100%; height: 55px; background: var(--stitch-blue);
            color: white; border: none; border-radius: 18px;
            font-size: 17px; font-weight: bold; cursor: pointer;
            box-shadow: 0 12px 24px rgba(14, 165, 233, 0.25);
            margin-top: 10px;
        }
        .submit-btn:hover { background: var(--deep-ocean); transform: scale(1.02); }

        .footer { margin-top: 25px; font-size: 14px; color: #94a3b8; }
        .footer a { color: var(--stitch-blue); font-weight: 600; text-decoration: none; }
    </style>
</head>
<body>
    <div class="ocean">
        <div class="wave"></div>
        <div class="wave"></div>
    </div>
    
    <div class="leaf-container" style="top: 10%; left: 5%;">
        <div class="palm-leaf" style="font-size: 120px; color: #10b981; animation: sway_slow 7s ease-in-out infinite;">🌿</div>
    </div>
    <div class="leaf-container" style="bottom: 20%; right: 3%;">
        <div class="palm-leaf" style="font-size: 200px; animation: sway_slow 5s ease-in-out infinite reverse;">🌴</div>
    </div>
    <div class="leaf-container" style="top: -50px; right: 20%;">
        <div class="palm-leaf" style="font-size: 100px; opacity: 0.2; animation: sway_fast 8s ease-in-out infinite;">🌿</div>
    </div>

    <div id="app">
        <div class="login-card">
            <div class="stitch-avatar">
                <div class="eyes">
                    <div class="eye"></div>
                    <div class="eye"></div>
                </div>
            </div>

            <div class="header">
                <h1>欢迎回家</h1>
                <p>Aloha! 这里是您的快乐实验站</p>
            </div>

            <div class="role-selector">
                <div class="role-btn" :class="{active: role==='yonghu'}" @click="setRole('yonghu')">成员</div>
                <div class="role-btn" :class="{active: role==='jiaolian'}" @click="setRole('jiaolian')">教练</div>
            </div>

            <form id="loginForm" class="layui-form">
                <div class="layui-form-item">
                    <input type="text" name="username" required lay-verify="required" placeholder="通行账号" autocomplete="off" class="layui-input">
                </div>
                <div class="layui-form-item">
                    <input type="password" name="password" required lay-verify="required" placeholder="安全密码" autocomplete="off" class="layui-input">
                </div>
                <button class="submit-btn" lay-submit lay-filter="login">开启冒险</button>
            </form>

            <div class="footer">
                还没有通行证？<a href="../yonghu/register.html?tablename=yonghu">申请加入 Ohana</a>
            </div>
        </div>
    </div>

    <script src="../../layui/layui.js"></script>
    <script src="../../js/vue.js"></script>
    <script src="../../js/config.js"></script>
    <script src="../../modules/config.js"></script>
    <script>
        var http = layui.http || { baseurl: (typeof resolveProjectBase === 'function' ? resolveProjectBase() : (window.location.protocol + '//' + window.location.host + '/')) };
var vue = new Vue({
            el: '#app',
            data: { baseUrl: http.baseurl,  role: 'yonghu' },
            methods: { img: function(path) { if (!path) return ''; if (path.indexOf('http') === 0) return path; return this.baseUrl.replace(/\/$/, '') + '/upload/' + path.replace(/^.*upload\//, ''); },  setRole: function(role) { this.role = role; } }
        });

        layui.use(['layer', 'form', 'http'], function() {
            var layer = layui.layer, form = layui.form, http = layui.http;
            form.on('submit(login)', function(data) {
                var formData = data.field;
                formData.role = vue.role;
                http.request(formData.role + '/login', 'get', formData, function(res) {
                    layer.msg('Aloha! 登录成功', { time: 1500, icon: 6 });
                    localStorage.setItem('Token', res.token);
                    localStorage.setItem('role', res.role);
                    localStorage.setItem('userTable', formData.role);
                    localStorage.setItem('sessionTable', formData.role);
                    localStorage.setItem('adminName', res.username || formData.username);
                    if (res.userId) localStorage.setItem('userid', res.userId);
                    window.location.href = '../../index.html';
                });
                return false;
            });
        });
    </script>
</body>
</html>
