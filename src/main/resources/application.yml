server:
    tomcat:
        uri-encoding: UTF-8
    port: 8080
    servlet:
        context-path: /zuqiujulebguanli

spring:
    main:
        banner-mode: "off"
        log-startup-info: true
    datasource:
        driverClassName: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://127.0.0.1:3306/zuqiujulebguanli?useUnicode=true&characterEncoding=utf-8&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=GMT%2B8&useSSL=false
        username: root
        password: 123456


    servlet:
      multipart:
        max-file-size: 1000MB
        max-request-size: 1000MB
    resources:
      static-locations: classpath:front/,classpath:static/,file:static/,file:upload/
#mybatis
mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml
  #зҖ№зӮ°з¶ӢйҺөоӮЈејҝй”ӣеұҪоҳҝж¶“зҢөackageйҗўг„©вӮ¬жҘҖеҪҝйҺҙж ¬вӮ¬е‘ӯеһҺйҚҷеі°еһҺй—…?  typeAliasesPackage: com.entity
  global-config:
    #ж¶“е©ҡж•ӯз»«иҜІзҖ·  0:"йҸҒзүҲеөҒжҗҙжҸ‘Dй‘·оҒ„о–ғ", 1:"йҗўг„ҰеҹӣжқҲж’іеҸҶID",2:"йҚҸг„Ҙзң¬йҚһоҲҷз«ҙID (йҸҒжқҝз“§з»«иҜІзҖ·йҚһоҲҷз«ҙID)", 3:"йҚҸг„Ҙзң¬йҚһоҲҷз«ҙID UUID";
    id-type: 1
    #зҖӣжҘҒоҶҢз»ӣж «жҡҗ 0:"и№Үз•ҢжҡҗйҚ’гӮҶжҹҮ",1:"й—Ҳ?NULL йҚ’гӮҶжҹҮ"),2:"й—ҲзӮөв”–йҚ’гӮҶжҹҮ"
    field-strategy: 2
    #жӨ№з…ҺеҳІж¶“е¬Әеһқз»ҫиғҜжөҶйҺ№?    db-column-underline: true
    #йҚ’й”ӢжҹҠmapper з’ӢеҶӯзҳҜз»ҒзӮІж«’
    refresh-mapper: false
    #й–«жҳҸз·«йҚ’зҠ»ж«Һй–°е¶Үз–Ҷ
    logic-delete-value: -1
    logic-not-delete-value: 0
    #й‘·оҒ„з•ҫж¶”еЎ–QLеЁүг„ҘеҸҶйҚЈ?    sql-injector: com.baomidou.mybatisplus.mapper.LogicSqlInjector
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true
    #springboot жӨӨеңӯжҙ°mybatis plus з’Ғеү§з–Ҷ jdbcTypeForNull (oracleйҸҒзүҲеөҒжҗҙж’»жё¶й–°е¶Үз–ҶJdbcType.NULL, жҰӣжЁҝо…»йҸ„з–§ther)
    jdbc-type-for-null: 'null'

#йҺөж’іеөғsqlз’Үо…һеҪһ
logging:
  level:
    root: info
    com.dao: warn
    com.zuqiujulebguanli.listener: warn
    com.zaxxer.hikari: warn
    org.apache.catalina.core.StandardService: warn
    org.apache.catalina.core.StandardEngine: warn
    org.apache.catalina.core.ContainerBase: warn
    org.springframework.web.context.ContextLoader: warn
    org.springframework.boot.autoconfigure.logging.ConditionEvaluationReportLoggingListener: warn


